<!doctype html>

<head>
  <meta charset="utf-8">
  <title>Argos 0.3.14</title>
  <style>
    body {
      font: -apple-system-body;
      color: #1f2f35;
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }
    h1 {
      font: -apple-system-title2;
      margin: 0 0 12px;
    }
    ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>Argos 0.3.14</h1>
  <p>本次更新修复灵动卡在部分 macOS 26+ 机器上打开即崩溃的问题。</p>
  <ul>
    <li>灵动岛逻辑恢复原状，不再改动灵动岛开关持久化和窗口层级。</li>
    <li>灵动卡默认关闭，并且不再把“已开启”状态持久化，避免一次崩溃后下次启动继续触发。</li>
    <li>灵动卡改用更保守的 floating panel 和 within-window material，降低 macOS 26+ 的 AppKit/WindowServer 兼容风险。</li>
    <li>关闭灵动卡时销毁透明 panel，并移除重复的显示/隐藏调用。</li>
    <li>继续保持安装包内不包含 Finder Sync Extension。</li>
  </ul>
</body>
</html>
