<body>
  <h1>Argos 0.3.11</h1>
  <p>本次更新移除了未使用的 Finder Sync Extension，降低外部机器上因扩展签名策略导致的启动失败风险。</p>
  <ul>
    <li>彻底删除 Finder 右键菜单扩展 target、源码和构建脚本。</li>
    <li>移除专用的 argos:// Finder URL handler。</li>
    <li>Release 打包流程只构建主 Argos app，避免嵌入未配置 provisioning 的扩展。</li>
    <li>清理无用模块和调试输出，降低维护成本。</li>
  </ul>
</body>
</html>
